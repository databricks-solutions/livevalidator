resources:
  jobs:
    run_validation:
      name: "[LiveValidator] ValidationRunner"
      
      tasks:
        - task_key: validate
          notebook_task:
            notebook_path: ../jobs/run_validation.py
            base_parameters:
              backend_api_url: ${var.backend_api_url}
          timeout_seconds: 3600
          disable_auto_optimization: true
          existing_cluster_id: ${resources.clusters.livevalidator.id}
          libraries:
            - maven:
                coordinates: com.teradata.jdbc:terajdbc:20.00.00.51
      
      max_concurrent_runs: 500
      parameters:
        - name: trigger_id
          default: ""
        - name: name
          default: ""
        - name: source_system_name
          default: ""
        - name: target_system_name
          default: ""
        - name: source_table
          default: ""
        - name: target_table
          default: ""
        - name: sql
          default: ""
        - name: compare_mode
          default: "except_all"
        - name: pk_columns
          default: ""
        - name: include_columns
          default: ""
        - name: exclude_columns
          default: ""
        - name: options
          default: "{}"

      permissions:
        - level: CAN_MANAGE
          group_name: 1dp-migration-prd-admin
        - level: CAN_MANAGE_RUN
          service_principal_name: f1011635-4c0f-4939-b262-b25676999ed3
        - level: CAN_MANAGE_RUN
          group_name: users
      
      tags:
        application: live-validator
        component: validation
