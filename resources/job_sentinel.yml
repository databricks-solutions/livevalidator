resources:
  jobs:
    job_sentinel:
      name: "[LiveValidator] JobSentinel"
      
      tasks:
        - task_key: orchestrate
          notebook_task:
            notebook_path: ../jobs/job_sentinel.py
            base_parameters:
              backend_api_url: ${resources.apps.live_validator.url}
              validation_job_id: ${resources.jobs.run_validation.id}
              poll_interval: "30"
          max_retries: 50
      
      tags:
        application: live-validator
        component: orchestrator