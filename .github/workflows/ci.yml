name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check src/app/backend

      - name: Run ruff formatter check
        run: ruff format --check src/app/backend

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov
          pip install fastapi pydantic asyncpg pytz croniter databricks-sdk

      - name: Run tests with coverage
        run: |
          pytest tests/backend \
            --cov=src/app/backend/services \
            --cov=src/app/backend/utils.py \
            --cov-report=term-missing \
            --cov-fail-under=65

