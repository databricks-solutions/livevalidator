name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check src/app/backend

      - name: Run ruff formatter check
        run: ruff format --check src/app/backend

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov
          pip install fastapi pydantic asyncpg pytz croniter databricks-sdk

      - name: Run tests with coverage
        run: |
          pytest tests/backend \
            --cov=src/app/backend/services \
            --cov=src/app/backend/utils.py \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=65

      - name: Extract coverage percentage
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        id: coverage
        run: |
          COVERAGE=$(python -c "import json; print(round(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          if [ $COVERAGE -ge 90 ]; then
            echo "color=brightgreen" >> $GITHUB_OUTPUT
          elif [ $COVERAGE -ge 80 ]; then
            echo "color=green" >> $GITHUB_OUTPUT
          elif [ $COVERAGE -ge 70 ]; then
            echo "color=yellow" >> $GITHUB_OUTPUT
          else
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: coverage-badge.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          color: ${{ steps.coverage.outputs.color }}
