variables:
  backend_api_url:
    description: "URL of the LiveValidator backend API"
    default: "https://live-validator-2263248446072504.aws.databricksapps.com"

targets:
  
  migr-prod:
    default: true
    mode: production
    workspace:
      host: https://dbc-d723fd35-120a.cloud.databricks.com/
    variables:
      backend_api_url: "https://live-validator-2263248446072504.aws.databricksapps.com"
    workspace:
      root_path: /Workspace/LiveValidator
    permissions:
      - level: CAN_MANAGE
        group_name: 1dp-migration-prd-admin

    resources:
      clusters:
        livevalidator:
          cluster_name: live-validator
          node_type_id: i3.2xlarge
          driver_node_type_id: i3.2xlarge
          autoscale:
            min_workers: 1
            max_workers: 8
          aws_attributes:
            availability: ON_DEMAND
          spark_conf:
            spark.hadoop.datanucleus.autoCreateTables: 'true'
            spark.hadoop.datanucleus.autoCreateSchema: 'true'
            spark.hadoop.javax.jdo.option.ConnectionDriverName: org.apache.derby.jdbc.EmbeddedDriver
            spark.sql.session.timeZone: America/Phoenix
            spark.hadoop.javax.jdo.option.ConnectionPassword: hivepass
            spark.hadoop.javax.jdo.option.ConnectionURL: jdbc:derby:memory:myInMemDB;create=true
            spark.sql.catalogImplementation: hive
            spark.hadoop.javax.jdo.option.ConnectionUserName: hiveuser
            spark.hadoop.datanucleus.fixedDatastore: 'false'
          spark_version: 17.3.x-scala2.13
          autotermination_minutes: 0
          enable_local_disk_encryption: false
          data_security_mode: USER_ISOLATION
          runtime_engine: PHOTON
          permissions:
            - group_name: users
              level: CAN_ATTACH_TO
            - group_name: 1dp-migration-prd-admin
              level: CAN_MANAGE

include:
  - resources/*.yml
